<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarginWatch — Export</title>
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container-fluid py-3" style="max-width:720px">
    <div class="d-flex align-items-center gap-3 mb-3">
      <h5 class="mb-0">Export</h5>
      <a href="/export/csv" class="btn btn-sm btn-success">Download CSV</a>
      <a href="/export/xlsx" class="btn btn-sm btn-success">Download XLSX</a>
      <button id="copyBtn" class="btn btn-sm" style="color:#7c3aed;border-color:#7c3aed" onclick="copyTable()">Copy CSV</button>
      <button onclick="window.close()" class="btn btn-sm btn-outline-secondary">✕ Close</button>
    </div>
    <table class="table table-sm table-bordered table-hover">
      <thead class="table-light">
        <tr>
          {% for h in headers %}
          <th>{{ h }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          {% for cell in row %}
          <td>{{ cell }}</td>
          {% endfor %}
        </tr>
        {% else %}
        <tr><td colspan="6" class="text-center text-muted py-3">No open positions.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <script>
    function copyTable() {
      const rows = document.querySelectorAll('table tr');
      const tsv = Array.from(rows).map(tr =>
        Array.from(tr.querySelectorAll('th, td')).map(c => c.innerText).join('\t')
      ).join('\n');
      navigator.clipboard.writeText(tsv).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        btn.style.cssText = 'background:#7c3aed;color:#fff;border-color:#7c3aed';
        setTimeout(() => {
          btn.textContent = 'Copy CSV';
          btn.style.cssText = 'color:#7c3aed;border-color:#7c3aed';
        }, 2000);
      });
    }
  </script>
</body>
</html>
