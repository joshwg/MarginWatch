<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarginWatch</title>
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container-fluid mw-app py-2">

  <!-- Top bar -->
  <div class="d-flex align-items-start gap-3 mb-2 p-2 bg-light border rounded">
    <!-- Summary -->
    <div class="mw-summary">
      <div class="d-flex gap-1 align-items-center">
        <small class="text-muted">Total:</small>
        <strong id="totalMargin" class="mw-val">$0.0k</strong>
      </div>
      <div class="d-flex gap-1 align-items-center">
        <small class="text-muted">Avail:</small>
        <strong id="availMargin" class="mw-val">$0.0k</strong>
      </div>
      <div class="d-flex gap-1 align-items-center">
        <small class="text-muted">Theta:</small>
        <strong id="totalTheta" class="mw-val">$0/d</strong>
      </div>
    </div>
    <!-- Sort -->
    <div class="d-flex flex-column gap-1 me-auto pt-1">
      <div class="form-check mb-0">
        <input class="form-check-input" type="radio" name="sort" id="sortAlpha" value="alpha" checked>
        <label class="form-check-label small" for="sortAlpha">A-Z</label>
      </div>
      <div class="form-check mb-0">
        <input class="form-check-input" type="radio" name="sort" id="sortExpiry" value="expiry">
        <label class="form-check-label small" for="sortExpiry">Exp</label>
      </div>
      <div class="form-check mb-0">
        <input class="form-check-input" type="radio" name="sort" id="sortType" value="type">
        <label class="form-check-label small" for="sortType">Type</label>
      </div>
    </div>
    <!-- Actions -->
    <div class="d-flex gap-1 align-items-start">
      <button class="btn btn-sm btn-outline-secondary" id="btnAdd" title="Add position">+</button>
      <button class="btn btn-sm btn-outline-secondary" id="btnRefresh" title="Refresh prices">&#8635;</button>
      <a class="btn btn-sm btn-outline-secondary" href="/export" target="_blank" title="Export CSV">&#128190;</a>
      <a class="btn btn-sm btn-outline-secondary" href="/logout" title="Log out">&#128682;</a>
    </div>
  </div>

  <!-- Positions table -->
  <div class="mw-table-wrap">
    <table class="table table-sm table-bordered mb-0" id="positionsTable">
      <thead class="table-light">
        <tr>
          <th class="sortable" data-col="position">Position</th>
          <th class="sortable text-center" data-col="qty">#</th>
          <th class="sortable text-end" data-col="margin">Margin</th>
          <th class="sortable text-end" data-col="opt">$/shr</th>
          <th class="sortable text-end" data-col="theta">Theta</th>
          <th class="mw-actions-col"></th>
        </tr>
      </thead>
      <tbody id="positionsBody">
        <tr><td colspan="6" class="text-center text-muted py-3">Loading&hellip;</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Config card -->
  <div class="card mt-3">
    <div class="card-header py-1 small fw-semibold">Configuration</div>
    <div class="card-body py-2">
      <div class="row g-2 align-items-center">
        <div class="col-auto">
          <label class="col-form-label col-form-label-sm">Max Margin ($1k steps):</label>
        </div>
        <div class="col-auto">
          <input type="number" class="form-control form-control-sm" id="cfgMargin"
                 step="1000" min="0" max="10000000" style="width:110px">
        </div>
        <div class="col-auto">
          <label class="col-form-label col-form-label-sm">Multiplier (0.5–4.0):</label>
        </div>
        <div class="col-auto">
          <input type="number" class="form-control form-control-sm" id="cfgMultiplier"
                 step="0.1" min="0.5" max="4.0" style="width:72px">
        </div>
        <div class="col-auto">
          <button class="btn btn-sm btn-primary" id="btnSaveConfig">Save</button>
          <span id="cfgSavedMsg" class="ms-2 text-success small" style="display:none">Saved</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Risk legend (populated by buildLegend() in app.js) -->
  <div class="card mt-2" id="riskLegend">
    <div class="card-header py-1 small fw-semibold">Risk Indicator Legend</div>
    <div class="card-body py-2">
      <div class="mw-legend" id="riskLegendItems"></div>
    </div>
  </div>

</div><!-- /.mw-app -->

<!-- ── Position Modal ──────────────────────────────────────────────────────── -->
<div class="modal fade" id="positionModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title" id="positionModalTitle">Add Position</h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body py-2">
        <form id="positionForm">
          <div class="row mb-2 align-items-center">
            <label class="col-4 col-form-label col-form-label-sm">Symbol</label>
            <div class="col-8">
              <input type="text" class="form-control form-control-sm" id="fSymbol" required>
            </div>
          </div>
          <div class="row mb-2 align-items-center">
            <label class="col-4 col-form-label col-form-label-sm">Type</label>
            <div class="col-8">
              <select class="form-select form-select-sm" id="fType">
                <option value="CALL">CALL</option>
                <option value="PUT" selected>PUT</option>
                <option value="STRADDLE">STRADDLE</option>
                <option value="CALL_SPREAD">CALL_SPREAD</option>
                <option value="PUT_SPREAD">PUT_SPREAD</option>
                <option value="STOCK">STOCK</option>
              </select>
            </div>
          </div>
          <div class="row mb-2 align-items-center" id="rowExpiration">
            <label class="col-4 col-form-label col-form-label-sm">Expiration</label>
            <div class="col-8">
              <input type="date" class="form-control form-control-sm" id="fExpiration">
            </div>
          </div>
          <div class="row mb-2 align-items-center" id="rowStrike">
            <label class="col-4 col-form-label col-form-label-sm" id="strikeLabel">Strike</label>
            <div class="col-8">
              <input type="number" class="form-control form-control-sm" id="fStrike"
                     step="0.5" min="0">
            </div>
          </div>
          <div class="row mb-2 align-items-center" id="rowStrike2">
            <label class="col-4 col-form-label col-form-label-sm" id="strike2Label">Strike 2</label>
            <div class="col-8">
              <input type="number" class="form-control form-control-sm" id="fStrike2"
                     step="0.5" min="0">
            </div>
          </div>
          <div class="row mb-2 align-items-center">
            <label class="col-4 col-form-label col-form-label-sm" id="qtyLabel">Contracts</label>
            <div class="col-8">
              <input type="number" class="form-control form-control-sm" id="fQty"
                     min="1" step="1" value="1">
            </div>
          </div>
          <div class="row mb-2 align-items-center d-none" id="rowShares">
            <label class="col-4 col-form-label col-form-label-sm">Long Shares</label>
            <div class="col-8">
              <input type="number" class="form-control form-control-sm" id="fShares"
                     min="0" step="1">
            </div>
          </div>
          <div class="row mb-2 align-items-center d-none" id="rowCost">
            <label class="col-4 col-form-label col-form-label-sm">Long Cost</label>
            <div class="col-8">
              <input type="number" class="form-control form-control-sm" id="fCost"
                     step="0.01" min="0">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-1">
        <button type="button" class="btn btn-warning btn-sm d-none" id="btnAssigned">Assigned</button>
        <button type="button" class="btn btn-secondary btn-sm d-none" id="btnClearCover">Clear Cover</button>
        <button type="submit" form="positionForm" class="btn btn-primary btn-sm">Save</button>
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Confirm Modal ───────────────────────────────────────────────────────── -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-body" id="confirmMsg"></div>
      <div class="modal-footer py-1">
        <button type="button" class="btn btn-primary btn-sm" id="btnConfirmYes">Yes</button>
        <button type="button" class="btn btn-outline-secondary btn-sm"
                data-bs-dismiss="modal">No</button>
      </div>
    </div>
  </div>
</div>

<!-- Position detail tooltip (hover / long-press) -->
<div id="posTooltip" class="mw-pos-tooltip" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/constants.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
